<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Калькулятор підлоги Чернівці</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #f3f4f6);
            color: var(--tg-theme-text-color, #1f2937);
        }
        .tg-card {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
        }
        .tg-button {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
    </style>
</head>
<body class="font-sans antialiased pb-32">

    <div class="p-4 text-center border-b border-gray-200 tg-card">
        <h1 class="text-xl font-bold">Розрахунок підлогового покриття</h1>
        <p class="text-xs text-green-600 mt-1">Досвід монтажу понад 15 років • Чернівці</p>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="p-4 rounded-xl shadow-sm tg-card">
            <h2 class="font-semibold text-sm uppercase tracking-wider text-gray-500 mb-3">1. Параметри кімнати</h2>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Довжина (м)</label>
                    <input type="number" id="room-length" step="0.1" value="5" class="w-full p-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 bg-white text-black">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Ширина (м)</label>
                    <input type="number" id="room-width" step="0.1" value="4" class="w-full p-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 bg-white text-black">
                </div>
            </div>
            <div class="mt-3">
                <label class="block text-xs font-medium text-gray-400 mb-1">Тип укладання (запас на підрізку)</label>
                <select id="layout-type" class="w-full p-2.5 rounded-lg border border-gray-300 bg-white text-black">
                    <option value="direct">Пряме (+5%)</option>
                    <option value="diagonal">Діагональне (+10%)</option>
                </select>
            </div>
        </div>

        <div class="p-4 rounded-xl shadow-sm tg-card">
            <h2 class="font-semibold text-sm uppercase tracking-wider text-gray-500 mb-3">2. Матеріали</h2>
            
            <div class="mb-3">
                <label class="block text-xs font-medium text-gray-400 mb-1">Тип покриття</label>
                <select id="flooring-type" class="w-full p-2.5 rounded-lg border border-gray-300 bg-white text-black">
                    <option value="laminate-32">Ламінат німецький 32 клас (550 грн/м²)</option>
                    <option value="laminate-33">Ламінат вологостійкий 33 клас (720 грн/м²)</option>
                    <option value="spc">SPC Вініл замковий (980 грн/м²)</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="block text-xs font-medium text-gray-400 mb-1">Підкладка під покриття</label>
                <select id="underlayment-type" class="w-full p-2.5 rounded-lg border border-gray-300 bg-white text-black">
                    <option value="pe-foam">Екструдований пінополістирол 3мм (45 грн/м²)</option>
                    <option value="cork">Натуральна пробка 2мм (135 грн/м²)</option>
                    <option value="none">Не потрібна / Вже є (0 грн)</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Плінтус</label>
                <select id="plinth-type" class="w-full p-2.5 rounded-lg border border-gray-300 bg-white text-black">
                    <option value="plastic">Пластиковий з кабель-каналом (95 грн/м.п.)</option>
                    <option value="mdf">МДФ білий під фарбування (190 грн/м.п.)</option>
                    <option value="none">Не потрібен (0 грн)</option>
                </select>
            </div>
        </div>

        <div class="p-4 rounded-xl shadow-sm tg-card">
            <h2 class="font-semibold text-sm uppercase tracking-wider text-gray-500 mb-3">3. Додаткові послуги Чернівці</h2>
            
            <label class="flex items-center space-x-3 mb-3 cursor-pointer">
                <input type="checkbox" id="opt-montage" checked class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                <span class="text-sm font-medium">Професійний монтаж під ключ (+160 грн/м²)</span>
            </label>

            <label class="flex items-center space-x-3 cursor-pointer">
                <input type="checkbox" id="opt-corners" class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                <span class="text-sm font-medium">Алюмінієві стикувальні порожки (350 грн/шт, рахуємо 2шт)</span>
            </label>
        </div>

        <div class="p-4 rounded-xl shadow-sm tg-card border border-gray-
