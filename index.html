<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Калькулятор підлоги Чернівці</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #f3f4f6);
            color: var(--tg-theme-text-color, #1f2937);
        }
        .tg-card {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
        }
        .tg-button {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
    </style>
</head>
<body class="font-sans antialiased pb-40"> <div class="p-4 text-center border-b border-gray-200 tg-card">
        <h1 class="text-xl font-bold">Розрахунок підлогового покриття</h1>
        <p class="text-xs text-green-600 mt-1">Досвід монтажу понад 15 років • Чернівці</p>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="p-4 rounded-xl shadow-sm tg-card">
            <h2 class="font-semibold text-sm uppercase tracking-wider text-gray-500 mb-3">1. Параметри кімнати</h2>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Довжина (м)</label>
                    <input type="number" id="room-length" step="0.1" value="5" class="w-full p-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 bg-white text-black">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Ширина (м)</label>
                    <input type="number" id="room-width" step="0.1" value="4" class="w-full p-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 bg-white text-black">
                </div>
            </div>
            <div class="mt-3">
                <label class="block text-xs font-medium text-gray-400 mb-1">Тип укладання (запас на підрізку)</label>
                <select id="layout-type" class="w-full p-2.5 rounded-lg border border-gray-300 bg-white text-black">
                    <option value="direct">Пряме (+5%)</option>
                    <option value="diagonal">Діагональне (+10%)</option>
                </select>
            </div>
        </div>

        <div class="p-4 rounded-xl shadow-sm tg-card">
            <h2 class="font-semibold text-sm uppercase tracking-wider text-gray-500 mb-3">2. Матеріали</h2>
            
            <div class="mb-3">
                <label class="block text-xs font-medium text-gray-400 mb-1">Тип покриття</label>
                <select id="flooring-type" class="w-full p-2.5 rounded-lg border border-gray-300 bg-white text-black">
                    <option value="laminate-32">Ламінат німецький 32 клас (550 грн/м²)</option>
                    <option value="laminate-33">Ламінат вологостійкий 33 клас (720 грн/м²)</option>
                    <option value="spc">SPC Вініл замковий (980 грн/м²)</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="block text-xs font-medium text-gray-400 mb-1">Підкладка під покриття</label>
                <select id="underlayment-type" class="w-full p-2.5 rounded-lg border border-gray-300 bg-white text-black">
                    <option value="pe-foam">Екструдований пінополістирол 3мм (45 грн/м²)</option>
                    <option value="cork">Натуральна пробка 2мм (135 грн/м²)</option>
                    <option value="none">Не потрібна / Вже є (0 грн)</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Плінтус</label>
                <select id="plinth-type" class="w-full p-2.5 rounded-lg border border-gray-300 bg-white text-black">
                    <option value="plastic">Пластиковий з кабель-каналом (95 грн/м.п.)</option>
                    <option value="mdf">МДФ білий під фарбування (190 грн/м.п.)</option>
                    <option value="none">Не потрібен (0 грн)</option>
                </select>
            </div>
        </div>

        <div class="p-4 rounded-xl shadow-sm tg-card">
            <h2 class="font-semibold text-sm uppercase tracking-wider text-gray-500 mb-3">3. Додаткові послуги Чернівці</h2>
            
            <label class="flex items-center space-x-3 mb-3 cursor-pointer">
                <input type="checkbox" id="opt-montage" checked class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                <span class="text-sm font-medium">Професійний монтаж під ключ (+160 грн/м²)</span>
            </label>

            <label class="flex items-center space-x-3 cursor-pointer">
                <input type="checkbox" id="opt-corners" class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                <span class="text-sm font-medium">Алюмінієві стикувальні порожки (350 грн/шт, рахуємо 2шт)</span>
            </label>
        </div>

        <div class="p-4 rounded-xl shadow-sm tg-card border border-gray-100">
            <h2 class="font-semibold text-sm uppercase tracking-wider text-gray-500 mb-2">Попередній кошторис</h2>
            <div class="space-y-2 text-sm">
                <div class="flex justify-between">
                    <span class="text-gray-400">Площа кімнати:</span>
                    <span class="font-semibold" id="res-area">0.00 м²</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-400">Матеріали:</span>
                    <span class="font-semibold" id="res-materials">0.00 грн</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-400">Робота та дод.:</span>
                    <span class="font-semibold" id="res-work">0.00 грн</span>
                </div>
                <hr class="border-gray-200 my-2">
                <div class="flex justify-between text-base font-bold">
                    <span>ЗАГАЛЬНА СУМА:</span>
                    <span class="text-green-600" id="res-total">0.00 грн</span>
                </div>
            </div>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 border-t border-gray-200 tg-card shadow-lg z-50">
        <button id="submit-btn" class="w-full py-3.5 px-4 rounded-xl font-bold text-center tg-button transition-transform active:scale-95">
            Надіслати розрахунок менеджеру
        </button>
    </div>

    <script>
        // Инициализация WebApp с защитой от ошибок
        let tg = null;
        try {
            tg = window.Telegram?.WebApp;
            if (tg) {
                tg.ready();
                tg.expand();
            }
        } catch (e) {
            console.error("Помилка ініціалізації Telegram WebApp:", e);
        }

        // Безопасное получение параметров из URL
        let clientPhone = 'Не вказано';
        let clientName = 'Клієнт';
        try {
            const urlParams = new URLSearchParams(window.location.search);
            clientPhone = urlParams.get('phone') || 'Не вказано';
            clientName = urlParams.get('name') || 'Клієнт';
        } catch (e) {
            console.error("Не вдалося отримати параметри з URL:", e);
        }

        const PRICES = {
            flooring: {
                'laminate-32': { name: 'Ламінат 32 клас', price: 550, pack: 2.22 },
                'laminate-33': { name: 'Ламінат 33 клас', price: 720, pack: 2.05 },
                'spc': { name: 'SPC Вініл', price: 980, pack: 2.15 }
            },
            underlayment: {
                'pe-foam': { name: 'Пінополістирол 3мм', price: 45 },
                'cork': { name: 'Пробка 2мм', price: 135 },
                'none': { name: 'Без підкладки', price: 0 }
            },
            plinth: {
                'plastic': { name: 'Пластиковий плінтус', price: 95 },
                'mdf': { name: 'МДФ плінтус', price: 190 },
                'none': { name: 'Без плінтуса', price: 0 }
            },
            montage: 160,
            cornerPrice: 350
        };

        let calculatedResult = null;

        function doCalculation() {
            try {
                const length = parseFloat(document.getElementById('room-length').value) || 0;
                const width = parseFloat(document.getElementById('room-width').value) || 0;
                const layout = document.getElementById('layout-type').value;

                const area = length * width;
                if (area <= 0) return;

                const margin = layout === 'diagonal' ? 1.10 : 1.05;
                const neededAreaWithMargin = area * margin;

                const flooringKey = document.getElementById('flooring-type').value;
                const flooringItem = PRICES.flooring[flooringKey];
                const floorPacks = Math.ceil(neededAreaWithMargin / flooringItem.pack);
                const floorActualArea = floorPacks * flooringItem.pack;
                const floorCost = Math.round(floorActualArea * flooringItem.price);

                const underlayKey = document.getElementById('underlayment-type').value;
                const underlayItem = PRICES.underlayment[underlayKey];
                const neededUnderlayArea = underlayKey === 'none' ? 0 : Math.ceil(area);
                const underlayCost = Math.round(neededUnderlayArea * underlayItem.price);

                const plinthKey = document.getElementById('plinth-type').value;
                const plinthItem = PRICES.plinth[plinthKey];
                const perimeter = (length + width) * 2;
                const plinthAmount = plinthKey === 'none' ? 0 : Math.ceil(perimeter * 1.05);
                const plinthCost = Math.round(plinthAmount * plinthItem.price);

                const needMontage = document.getElementById('opt-montage').checked;
                const montageCost = needMontage ? Math.round(area * PRICES.montage) : 0;

                const needCorners = document.getElementById('opt-corners').checked;
                const cornersCost = needCorners ? (PRICES.cornerPrice * 2) : 0;

                const materialsTotal = floorCost + underlayCost + plinthCost;
                const workAndAdditionalTotal = montageCost + cornersCost;
                const total = materialsTotal + workAndAdditionalTotal;

                document.getElementById('res-area').innerText = `${area.toFixed(2)} м²`;
                document.getElementById('res-materials').innerText = `${materialsTotal.toLocaleString()} грн`;
                document.getElementById('res-work').innerText = `${workAndAdditionalTotal.toLocaleString()} грн`;
                document.getElementById('res-total').innerText = `${total.toLocaleString()} грн`;

                calculatedResult = {
                    area: area.toFixed(2),
                    floorName: flooringItem.name,
                    floorPacks: floorPacks,
                    floorCost: floorCost,
                    underlayName: underlayItem.name,
                    underlayArea: neededUnderlayArea,
                    underlayCost: underlayCost,
                    plinthName: plinthItem.name,
                    plinthAmount: plinthAmount,
                    plinthCost: plinthCost,
                    montage: needMontage ? "Потрібен" : "Ні",
                    montageCost: montageCost,
                    corners: needCorners ? "Потрібні (2 шт)" : "Ні",
                    total: total,
                    clientName: clientName,
                    clientPhone: clientPhone
                };
            } catch (e) {
                console.error("Помилка під час розрахунку:", e);
            }
        }

        const inputs = ['room-length', 'room-width', 'layout-type', 'flooring-type', 'underlayment-type', 'plinth-type', 'opt-montage', 'opt-corners'];
        inputs.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', doCalculation);
                el.addEventListener('change', doCalculation);
            }
        });

        // Первичный запуск
        doCalculation();

        document.getElementById('submit-btn').addEventListener('click', () => {
            if (!calculatedResult || calculatedResult.total === 0) {
                alert("Будь ласка, введіть параметри кімнати перед відправкою.");
                return;
            }
            if (tg) {
                try {
                    tg.sendData(JSON.stringify(calculatedResult));
                    tg.close();
                } catch (e) {
                    alert("Помилка відправки в Telegram: " + e.message);
                }
            } else {
                alert("Розрахунок готовий! У звичайному браузері відправка імітується:\n" + JSON.stringify(calculatedResult, null, 2));
            }
        });
    </script>
</body>
</html>
